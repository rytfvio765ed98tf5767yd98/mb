  <style>
    html { scrollbar-gutter: stable; overflow-y: scroll; }
    body {
      margin: 0; padding: 0;
      background-color: #000;
      color: #aaa;
      padding-top: 10vh;
      min-height: 100vh;
      font-family: 'Roboto Mono', monospace;
      overflow-x: hidden;
    }

    #preloader { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background-color: black; display: flex; justify-content: center; align-items: center; 
      z-index: 9999; transition: opacity 1.5s ease, visibility 1.5s; 
    }
    #preloader.hidden { opacity: 0; visibility: hidden; }
    .loader-container { width: 90vw; max-width: 600px; height: 2px; background-color: rgba(255, 255, 255, 0.1); margin-top: 40px; position: relative; }
    .loader-bar { width: 0%; height: 2px; background-color: white; transition: width 0.4s ease-out; }
    .loading-text { margin-top: 15px; font-size: 10px; letter-spacing: 4px; color: #444; text-transform: uppercase; }
    .blink { animation: blinker 1.5s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    .filter-links {
      width: 90%; max-width: 1100px; margin: 32px auto 20px;
      display: flex; justify-content: center; align-items: center; gap: 15px;
    }
    .filter-links a { color: #555; text-decoration: none; transition: 0.3s; font-weight: bold; text-transform: uppercase; font-size: 13px; cursor: pointer; }
    .filter-links a:hover, .filter-links a.active-filter { color: #fff; }
    .filter-links .dot { color: #222; font-weight: bold; }

    #works-grid {
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 50px 25px; 
      width: 90%; 
      max-width: 1100px; 
      margin: 40px auto 150px;
    }

    .work-link { 
      text-decoration: none; color: inherit; display: block; 
      position: relative;
      opacity: 1;
    }

    .raw-appear {
        animation: rawStep 0.1s steps(2);
    }
    @keyframes rawStep {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .media-container { 
      width: 100%; aspect-ratio: 1 / 1; background-color: #111; 
      overflow: hidden; border: 1px solid transparent; transition: border-color 0.4s ease;
      position: relative;
    }
    .work-link:hover .media-container { border-color: #fff; }
    .work-media { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.6s ease; }
    .work-link:hover .work-media { filter: grayscale(0); transform: scale(1.05); }

    .ascii-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: black; color: white;
      font-family: 'Courier New', monospace; font-size: 12px; line-height: 10px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 20;
      white-space: pre; overflow: hidden;
      opacity: 0;
    }

    .work-info { padding-top: 15px; display: flex; flex-direction: column; }
    .work-info .meta { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .work-info h3 { margin: 0; font-size: 16px; color: #eee; font-weight: normal; transition: 0.3s; }
    .work-link:hover h3 { color: #fff; }
    .pinned-label { color: #fff; font-size: 10px; margin-left: 5px; opacity: 0.6; }

    footer { width: 90%; max-width: 1100px; text-align: center; font-size: 12px; color: #444; margin: 400px auto 12px; font-family: monospace; }

    @media (max-width: 900px) { 
      #works-grid { grid-template-columns: repeat(2, 1fr); gap: 30px 15px; } 
    }
    @media (max-width: 600px) { 
      .filter-links { flex-wrap: wrap; gap: 8px; font-size: 11px; } 
      #works-grid { grid-template-columns: repeat(2, 1fr); gap: 20px 10px; width: 95%; } 
    }

    html, body {
      scrollbar-width: thin;
      scrollbar-color: #333 #000;
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background-color: #333; border-radius: 5px; border: 2px solid #000; }

    .rss-sticky-bottom {
      position: fixed; bottom: 25px; right: 25px; z-index: 2000;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1); width: 45px; height: 45px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .rss-sticky-bottom:hover { background: #fff; border-color: #fff; }
    .rss-sticky-bottom svg { stroke: #fff; transition: stroke 0.3s ease; }
    .rss-sticky-bottom:hover svg { stroke: #000; }
    #preloader:not(.hidden) ~ .rss-sticky-bottom { display: none; }

    @media (max-width: 600px) {
      .rss-sticky-bottom { bottom: 15px; right: 15px; width: 38px; height: 38px; }
    }
  </style>
</head>

<script>
  const richChars = ["+", "#", "x", "*", "+", "''", ":", ",", ".", " ", " "];
  
  function generateAsciiGrid(width, height, step, maxSteps, type) {
      let str = "";
      const centerX = width / 2;
      const centerY = height / 2;
      let progress = step / maxSteps;
      const feather = 0.5;

      for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
              const dx = (x - centerX) / (centerX * 1.2);
              const dy = (y - centerY) / centerY;
              const dist = Math.sqrt(dx * dx + dy * dy);

              let radius = type === "out" ? (1 - progress) : progress;
              radius *= 1.5; 

              let probability = (radius + feather - dist) / (feather * 2);
              probability = Math.max(0, Math.min(1, probability));

              if (Math.random() < probability) {
                  const charPool = probability > 0.4 ? richChars : [".", ":", "·", " "];
                  str += charPool[Math.floor(Math.random() * charPool.length)];
              } else {
                  str += Math.random() > 0.995 ? "·" : " ";
              }
          }
          str += "\n";
      }
      return str;
  }

  async function animateAscii(overlay, type = "out") {
      overlay.style.opacity = "1";
      const steps = 15; 
      const frameTime = 30; 

      for (let i = 0; i <= steps; i++) {
          overlay.innerText = generateAsciiGrid(13, 9, i, steps, type);
          await new Promise(r => setTimeout(r, frameTime));
      }
      
      if (type === "out") {
          overlay.style.opacity = "1"; 
      } else {
          overlay.style.opacity = "0"; 
          overlay.innerText = "";
      }
  }

  async function filterWorks(category, clickedLink) {
      const works = document.querySelectorAll(".work-link");
      
      document.querySelectorAll('.filter-links a').forEach(l => l.classList.remove('active-filter'));
      clickedLink.classList.add('active-filter');

      const toHide = [];
      const toShow = [];

      works.forEach(link => {
          const isMatch = (category === 'all' || link.dataset.category === category);
          const isVisible = link.style.display !== "none";

          if (isVisible && !isMatch) toHide.push(link);
          else if (!isVisible && isMatch) toShow.push(link);
      });

      if (toHide.length > 0) {
          toHide.forEach(async (link) => {
              const overlay = link.querySelector('.ascii-overlay');
              link.style.pointerEvents = "none";
              await animateAscii(overlay, "out");
              link.style.display = "none";
          });
      }

      if (toShow.length > 0) {
          toShow.forEach(link => {
              link.style.display = "block";
              const overlay = link.querySelector('.ascii-overlay');
              overlay.innerText = ""; 
              animateAscii(overlay, "in").then(() => {
                  link.style.pointerEvents = "auto";
              });
          });
      }
  }

  const mediaElements = document.querySelectorAll('img, video');
  const bar = document.getElementById('bar');
  const preloader = document.getElementById('preloader');
  let loadedCount = 0;
  const totalMedia = mediaElements.length;

  function hidePreloader() {
      if (preloader && !preloader.classList.contains('hidden')) {
          if (bar) bar.style.width = '100%';
          setTimeout(() => preloader.classList.add('hidden'), 300);
      }
  }

  function updateProgress() {
      loadedCount++;
      if (totalMedia > 0) {
          const percentage = (loadedCount / totalMedia) * 100;
          if (bar) bar.style.width = percentage + '%';
          if (loadedCount >= totalMedia) hidePreloader();
      }
  }

  if (totalMedia === 0) hidePreloader();
  else {
      mediaElements.forEach(media => {
          if (media.tagName.toLowerCase() === 'img') {
              if (media.complete) updateProgress();
              else { media.addEventListener('load', updateProgress); media.addEventListener('error', updateProgress); }
          }
      });
  }

  window.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById("works-grid");
      if (grid) {
          const cards = Array.from(grid.querySelectorAll('.work-link'));
          cards.sort((a, b) => new Date(b.dataset.date.split('.').reverse().join('-')) - new Date(a.dataset.date.split('.').reverse().join('-')));
          cards.forEach(c => grid.appendChild(c));
      }
  });

  window.addEventListener('load', hidePreloader);
</script>
