  <script>
    const slider = document.getElementById('featuredSlider');
    const slides = slider.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('sliderDots');
    let currentIndex = 0;
    let slideInterval;
    const intervalTime = 5000;

    if (dotsContainer && slides.length > 0) {
      slides.forEach((_, index) => {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (index === 0) dot.classList.add('active');
        dot.addEventListener('click', () => goToSlide(index));
        dotsContainer.appendChild(dot);
      });
    }

    const dots = dotsContainer.querySelectorAll('.dot');

    function goToSlide(index) {
      if (!slides[currentIndex] || !dots[currentIndex]) return;
      
      slides[currentIndex].classList.remove('active');
      dots[currentIndex].classList.remove('active');
      
      currentIndex = index;
      
      slides[currentIndex].classList.add('active');
      dots[currentIndex].classList.add('active');
    }

    function nextSlide() {
      let nextIndex = (currentIndex + 1) % slides.length;
      goToSlide(nextIndex);
    }

    function startSlider() {
      stopSlider(); 
      slideInterval = setInterval(nextSlide, intervalTime);
    }

    function stopSlider() {
      clearInterval(slideInterval);
    }

    startSlider();

    slider.addEventListener('mouseenter', stopSlider);
    slider.addEventListener('mouseleave', startSlider);
    
async function fetchRandomQuote() {
  const quoteDisplay = document.getElementById("quote-display");
  try {
    const response = await fetch('quotes.txt?t=' + Date.now());
    const text = await response.text();
    const lines = text.split('\n').filter(line => line.trim() !== '');
    if (lines.length > 0) {
      const randomLine = lines[Math.floor(Math.random() * lines.length)];
      quoteDisplay.textContent = randomLine;
    }
  } catch (e) { console.log("Quotes file not found"); }
}

async function fetchRecentActivity() {
  const widgetContent = document.getElementById("widget-content");
  if (!widgetContent) return;
  try {
    const [writingsRes, worksRes] = await Promise.all([
      fetch('./writings.html?t=' + Date.now()),
      fetch('./works.html?t=' + Date.now())
    ]);
    const writingsHtml = writingsRes.ok ? await writingsRes.text() : "";
    const worksHtml = worksRes.ok ? await worksRes.text() : "";
    const parser = new DOMParser();
    const items = [];

    if (writingsHtml) {
      const docW = parser.parseFromString(writingsHtml, 'text/html');
      docW.querySelectorAll('.article-link').forEach(art => {
        const title = art.querySelector('h3')?.textContent || 'Untitled';
        const href = art.getAttribute('href');
        const dateStr = art.querySelector('.article-meta-row span')?.textContent.trim() || "";
        items.push({ title, dateStr, href, type: 'writing' });
      });
    }

    if (worksHtml) {
      const docWorks = parser.parseFromString(worksHtml, 'text/html');
      docWorks.querySelectorAll('.work-link').forEach(work => {
        const dateStrRaw = work.querySelector('.meta')?.textContent.split('|')[0].trim() || "";
        if (dateStrRaw.includes('3000')) return; 
        const title = work.querySelector('h3')?.textContent.replace('[pinned]', '').trim() || 'Untitled Work';
        const href = work.getAttribute('href');
        items.push({ title, dateStr: dateStrRaw, href, type: 'work' });
      });
    }

    const sortedActivity = items.map(item => {
      let timestamp = 0;
      if (item.dateStr.includes('.')) {
        const parts = item.dateStr.split('.');
        if (parts.length === 3) { timestamp = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime(); }
      }
      return { ...item, timestamp };
    })
    .filter(item => item.timestamp > 0) 
    .sort((a, b) => b.timestamp - a.timestamp)
    .slice(0, 3);

    widgetContent.innerHTML = '';
    if (sortedActivity.length === 0) {
      widgetContent.innerHTML = '<p style="font-size:10px; color:#555; padding:10px;">No activity found.</p>';
      return;
    }

    sortedActivity.forEach(item => {
      let prefix = '';
      if (item.type === 'work') { prefix = '⧉&nbsp;| '; } 
      else if (item.type === 'writing') { prefix = '✎&nbsp;| '; }
      widgetContent.innerHTML += `
        <a href="${item.href}" class="widget-item">
          <span class="widget-title">${prefix}${item.title}</span>
          <span class="widget-date">${item.dateStr}</span>
        </a>`;
      });
  } catch (e) { 
    console.error("Błąd fetch activity:", e);
    widgetContent.innerHTML = '<p style="font-size:10px; color:#555; padding:10px;">Unavailable</p>'; 
  }
}

function initAsciiFade() {
  const overlay = document.getElementById('ascii-fade-overlay');
  const canvas = document.getElementById('ascii-canvas');
  const asciiShades = [" ", "░", "▒", "▓", "█"];
  
  document.addEventListener('click', function(e) {
    const link = e.target.closest('.tile, .mobile-primary-links a');
    if (!link) return;
    if (link.getAttribute('target') === '_blank') return;

    e.preventDefault(); 
    const targetUrl = link.getAttribute('href');
    if (!targetUrl || targetUrl === '#') return;

    overlay.style.display = 'block';
    overlay.style.pointerEvents = 'auto';
    overlay.style.backgroundColor = 'transparent';

    const charWidth = 9.6; 
    const charHeight = 16;
    const cols = Math.ceil(window.innerWidth / charWidth);
    const rows = Math.ceil(window.innerHeight / charHeight);
    
    let matrix = Array.from({ length: rows }, () => new Array(cols).fill(0));

    function render() {
      let text = "";
      for (let r = 0; r < rows; r++) {
        text += matrix[r].map(val => asciiShades[val]).join("") + "\n";
      }
      canvas.textContent = text;
    }

    const totalCells = cols * rows;
    let cellsFinished = 0;
    
    const fadeInterval = setInterval(() => {
      const changesPerTick = Math.ceil(totalCells * 0.12); 

      for (let i = 0; i < changesPerTick; i++) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        
        if (matrix[r][c] < asciiShades.length - 1) {
          matrix[r][c]++;
          if (matrix[r][c] === asciiShades.length - 1) {
            cellsFinished++;
          }
        }
      }

      render();

      if (cellsFinished >= totalCells * 0.95) {
        clearInterval(fadeInterval);
        overlay.style.backgroundColor = '#000000';
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 100);
      }
    }, 30);
  });
}
    
window.addEventListener('load', function() {
